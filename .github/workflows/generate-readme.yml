name: Generate README from notebook

on:
  push:
    branches:
      - main
    paths:
      - "sshmodel.ipynb"
      - "scripts/normalize_notebook.py"
      - ".github/workflows/generate-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nbconvert
        run: python -m pip install --upgrade nbconvert

      - name: Normalize and validate notebook
        run: python scripts/normalize_notebook.py

      - name: Convert notebook to README
        run: |
          rm -rf README_files
          jupyter nbconvert \
            --to markdown \
            --output README \
            --output-dir . \
            sshmodel.ipynb

      - name: Validate generated README
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("README.md").read_text(encoding="utf-8")
          required = [
              r"\{\sigma_z,H(k)\}=0",
              r"\frac{1}{2}\int_{-\pi}^{\pi}",
              r"\gamma_\pm=\operatorname{Arg}W_\pm",
              r"H_{1,2N}=H_{2N,1}=w",
          ]
          forbidden = [
              r"[\sigma_z, H(k)] = 0",
              r"H_{1,2N}=H_{2N,1}=v",
              r"\begin{equation}",
              "Willson loop",
          ]

          for expression in required:
              if expression not in text:
                  raise SystemExit(f"Required corrected expression is missing: {expression}")
          for expression in forbidden:
              if expression in text:
                  raise SystemExit(f"Known incorrect expression remains: {expression}")
          if text.count("$$") % 2:
              raise SystemExit("Unbalanced display-math delimiters ($$).")
          PY

      - name: Commit notebook and generated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Notebook and README are already up to date."
          else
            git commit -m "Fix SSH derivations and README math"
            git push
          fi
