name: Generate README from notebook

on:
  push:
    branches:
      - main
    paths:
      - "ssh_v251106.ipynb"
      - ".github/workflows/generate-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nbconvert
        run: python -m pip install --upgrade nbconvert

      - name: Convert notebook to README
        run: |
          test -f ssh_v251106.ipynb
          jupyter nbconvert \
            --to markdown \
            --output README \
            --output-dir . \
            ssh_v251106.ipynb

      - name: Commit generated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if [ -d README_files ]; then
            git add README_files
          fi
          if git diff --cached --quiet; then
            echo "README is already up to date."
          else
            git commit -m "Generate README from SSH notebook"
            git push
          fi
