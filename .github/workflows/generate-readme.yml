name: Generate README from notebook

on:
  push:
    branches:
      - main
    paths:
      - "sshmodel.ipynb"
      - "scripts/normalize_notebook.py"
      - "scripts/cleanup_remaining.py"
      - "scripts/fix_github_math.py"
      - "scripts/verify_ssh.py"
      - ".github/workflows/generate-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade nbconvert numpy

      - name: Normalize notebook formulas
        run: python scripts/normalize_notebook.py

      - name: Remove stale cells and align code
        run: python scripts/cleanup_remaining.py

      - name: Repair math for GitHub Markdown
        run: python scripts/fix_github_math.py

      - name: Verify SSH algebra and numerics
        run: python scripts/verify_ssh.py

      - name: Convert notebook to README
        run: |
          rm -rf README_files
          jupyter nbconvert \
            --to markdown \
            --output README \
            --output-dir . \
            sshmodel.ipynb

      - name: Validate generated README
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path("README.md").read_text(encoding="utf-8")
          required = [
              r"\{\sigma_z,H(k)\}=0",
              r"\frac{1}{2}\int_{-\pi}^{\pi}",
              r"\gamma_\pm=\mathrm{Arg}\,W_\pm",
              r"H_{1,2N}=H_{2N,1}=w",
              "overlap / abs(overlap)",
              "probability = np.abs(eigenvectors_open[vi, :, n]) ** 2",
          ]
          forbidden = [
              r"[\sigma_z, H(k)] = 0",
              r"H_{1,2N}=H_{2N,1}=v",
              r"\begin{equation}",
              r"\operatorname",
              r"\begin{cases}",
              r"\end{cases}",
              r"\(",
              r"\)",
              r"\!",
              r"\nu&=0",
              "Willson loop",
              "phase_pi = np.angle(phase)",
              "npr_psiL[:,:,0]",
              "plt.yticks(np.linspace(-1,1,5))",
              "上のコードを適当に弄ると、非エルミートな場合の計算も可能",
          ]

          for expression in required:
              if expression not in text:
                  raise SystemExit(f"Required corrected expression is missing: {expression}")
          for expression in forbidden:
              if expression in text:
                  raise SystemExit(f"Unsupported or stale expression remains: {expression}")
          if text.count("$$") % 2:
              raise SystemExit("Unbalanced display-math delimiters ($$).")

          spacing_errors = []
          fenced_parts = re.split(r"(```.*?```)", text, flags=re.DOTALL)
          for fenced_index in range(0, len(fenced_parts), 2):
              display_parts = re.split(
                  r"(\$\$.*?\$\$)",
                  fenced_parts[fenced_index],
                  flags=re.DOTALL,
              )
              for display_index in range(0, len(display_parts), 2):
                  plain = display_parts[display_index]
                  for pattern in (
                      r"[^\s\n$]\$[^\n$]+?\$",
                      r"\$[^\n$]+?\$[^\s\n$]",
                  ):
                      spacing_errors.extend(match.group(0) for match in re.finditer(pattern, plain))

          if spacing_errors:
              preview = "\n".join(spacing_errors[:10])
              raise SystemExit(
                  "Inline math without surrounding ASCII spaces remains:\n" + preview
              )
          PY

      - name: Commit notebook and generated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Notebook and README are already up to date."
          else
            git commit -m "Normalize inline math spacing"
            git push
          fi
