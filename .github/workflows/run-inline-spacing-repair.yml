name: Run inline math spacing repair

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/run-inline-spacing-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nbconvert
        run: python -m pip install --upgrade nbconvert

      - name: Normalize inline math spacing
        run: python scripts/fix_github_math.py

      - name: Regenerate README
        run: |
          rm -rf README_files
          jupyter nbconvert \
            --to markdown \
            --output README \
            --output-dir . \
            sshmodel.ipynb

      - name: Commit repaired files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sshmodel.ipynb README.md README_files
          if git diff --cached --quiet; then
            echo "Inline math spacing is already normalized."
          else
            git commit -m "Normalize README inline math spacing"
            git push
          fi
